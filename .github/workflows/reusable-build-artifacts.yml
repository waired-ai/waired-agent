# Reusable build matrix for the release/edge pipelines. Builds the full
# cross-platform artifact set once and uploads them so the calling
# workflow's publish job can fan them out to the right channel:
#
#   Linux:   amd64 + arm64 .deb (via nfpm)            -> artifact deb-<arch>
#   Windows: amd64 zip + sha256 + Inno Setup .exe     -> artifact windows-amd64
#   macOS:   amd64 + arm64 unsigned ad-hoc tar.gz     -> artifact darwin-all
#
# Version handling keys off the *caller's* trigger via the `github`
# context (which, inside a workflow_call workflow, reflects the calling
# event). The "Resolve build version" step below computes two strings
# from it:
#   - tag push (release.yml): both = the tag with leading `v` stripped
#     (e.g. 0.0.1-rc11) — unchanged stable behaviour.
#   - non-tag (edge.yml, push to main / dispatch): a SemVer prerelease off
#     the latest stable tag's numeric core,
#     <core>-edge.<UTC yyyymmddHHMMSS>+<shortsha> (e.g.
#     0.0.1-edge.20260610143000+abc1234). The .deb form swaps the
#     prerelease `-` for Debian's `~` so it sorts below stable and
#     monotonically by the timestamp.
# So this single matrix serves both release.yml (tagged) and edge.yml
# (main-tracking) with no inputs. DRY-up of the previously-duplicated
# build jobs — see #282.
name: reusable-build-artifacts

on:
  workflow_call:

# Inline-inject safe.directory=* — see ci.yml for rationale. A called
# workflow does NOT inherit the caller's workflow-level env/defaults, so
# these are re-declared here (mirrors reusable-go-test.yml).
env:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: safe.directory
  GIT_CONFIG_VALUE_0: "*"

defaults:
  run:
    shell: bash

jobs:
  build:
    # All four legs run on GitHub-hosted runners: the repo is public, so
    # hosted standard runners are free, and the ephemeral hosted runner +
    # GitHub OIDC give a stronger SLSA-style builder provenance chain
    # while Authenticode signing is still deferred (see docs/decisions.md
    # "Release builds run on GHA hosted runners"). The windows/darwin
    # legs previously ran on self-hosted ephemeral-VM pools purely to cut
    # the GH-hosted bill while the repo was private (#516 / #547); with
    # the public-repo free allowance that rationale is gone.
    #
    # Linux legs use the golang:1.24-trixie container for build
    # reproducibility; Windows/macOS run container-less because
    # iscc.exe / make / tar / shasum live on the runner image directly.
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runs-on }}
    container: ${{ fromJSON(matrix.container) }}
    # Build only checks out, compiles, and uploads artifacts. id-token /
    # contents:write are needed only by the caller's publish job.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runs-on: ubuntu-24.04
            container: '{"image":"golang:1.24-trixie"}'
          - goos: linux
            goarch: arm64
            # Native arm64 hosted runner. Pinned to 24.04 to match the
            # amd64 entry; `ubuntu-26.04-arm` is not yet provided
            # (actions/runner-images#13855).
            runs-on: ubuntu-24.04-arm
            container: '{"image":"golang:1.24-trixie"}'
          - goos: windows
            goarch: amd64
            # GH-hosted windows-latest: the runner image ships make, Inno
            # Setup 6 (iscc) and signtool — everything dist-windows-installer
            # and the GUI installer step need, no per-job installs.
            runs-on: windows-latest
            container: 'null'
          - goos: darwin
            goarch: all
            # GH-hosted Apple-Silicon runner with Xcode CLT:
            # build-agent-darwin cross-compiles the amd64 slice
            # (CGO_ENABLED=0); the bundled tray (build-tray-darwin) needs
            # CGO_ENABLED=1 + clang, and clang cross-targets the amd64 slice
            # with no extra flags. A single job emits both
            # waired-darwin-{amd64,arm64}.tar.gz, each containing waired +
            # waired-agent + waired-tray. Binaries are unsigned ad-hoc;
            # notarization is #262. Pinned like the ubuntu legs.
            runs-on: macos-14
            container: 'null'
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history + tags so the edge version's "Resolve build
          # version" step can `git describe` the latest stable v* tag.
          fetch-depth: 0

      - name: Resolve build version
        # Single source of truth for the version stamped into every
        # artifact this matrix builds. See the file header for the scheme.
        #   WAIRED_SEMVER      -> Go buildinfo (ldflags), Windows Inno
        #                         AppVersion, macOS VERSION file.
        #   WAIRED_DEB_VERSION -> the .deb Version field. nfpm's
        #                         version_schema is 'none', so we do the
        #                         SemVer-`-` -> Debian-`~` rewrite here.
        run: |
          set -euo pipefail
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            v="${GITHUB_REF_NAME#v}"
            semver="${v}"
            debver="${v}"
          else
            core="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"
            core="${core#v}"
            core="${core%%[-+]*}"
            [[ -n "${core}" ]] || core="0.0.0"
            ts="$(date -u +%Y%m%d%H%M%S)"
            sha="$(git rev-parse --short HEAD)"
            semver="${core}-edge.${ts}+${sha}"
            debver="${core}~edge.${ts}+${sha}"
          fi
          echo "WAIRED_SEMVER=${semver}" >> "$GITHUB_ENV"
          echo "WAIRED_DEB_VERSION=${debver}" >> "$GITHUB_ENV"
          echo "::notice::build version: semver=${semver} deb=${debver}"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install build deps (make, envsubst)
        if: matrix.goos == 'linux'
        run: |
          set -euo pipefail
          apt-get update -qq
          apt-get install -y --no-install-recommends make gettext-base

      - name: Install nfpm
        if: matrix.goos == 'linux'
        run: |
          set -euo pipefail
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.41.3
          # GOPATH/bin is not on PATH inside this container; surface it
          # so subsequent run-steps and the Makefile's command -v check
          # find nfpm.
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Generate LICENSE + THIRD_PARTY_LICENSES (bundled into the .deb)
        if: matrix.goos == 'linux'
        run: make third-party-licenses

      - name: Build .deb packages
        if: matrix.goos == 'linux'
        run: |
          set -euo pipefail
          export PKG_VERSION="${WAIRED_DEB_VERSION}"
          make deb-${{ matrix.goarch }}
          ls -lh dist/

      - uses: actions/upload-artifact@v7
        if: matrix.goos == 'linux'
        with:
          name: deb-${{ matrix.goarch }}
          path: dist/*.deb
          if-no-files-found: error
          retention-days: 1

      # One copy of the license notices rides to the caller's publish job
      # as a standalone release asset (amd64 leg only — the file is
      # arch-independent).
      - uses: actions/upload-artifact@v7
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        with:
          name: third-party-licenses
          path: dist/THIRD_PARTY_LICENSES
          if-no-files-found: error
          retention-days: 1

      # Windows-specific build. windows-latest ships `make`, `powershell.exe`,
      # and `iscc.exe` (Inno Setup 6) -- exactly what `make
      # dist-windows-installer` and the GUI installer step need.
      - name: Build Windows release zip
        if: matrix.goos == 'windows'
        run: |
          set -euo pipefail
          export VERSION="${WAIRED_SEMVER}"
          make dist-windows-installer
          ls -lh dist/

      - name: Build Windows GUI installer (Inno Setup)
        if: matrix.goos == 'windows'
        run: |
          set -euo pipefail
          version="${WAIRED_SEMVER}"
          # iscc is on PATH on windows-latest (choco's ISCC.exe shim). Fall back
          # to the canonical Inno Setup 6 install dir if the PATH entry is missing.
          if ! command -v iscc >/dev/null 2>&1; then
            iscc='/c/Program Files (x86)/Inno Setup 6/ISCC.exe'
          else
            iscc=iscc
          fi
          "$iscc" "//DAppVersion=${version}" packaging/windows/waired-setup.iss
          ls -lh dist/WairedSetup-*.exe

      # Authenticode signing placeholder. Inert until a code-signing
      # identity is provisioned (see docs/decisions.md). When the secret
      # is set, base64-decode the PFX and signtool the Setup.exe. The
      # bare EXEs inside the zip are verified by SHA-256 + run via SCM,
      # so SmartScreen mostly only matters for the GUI Setup.exe.
      - name: Sign Windows GUI installer (optional)
        if: matrix.goos == 'windows' && env.WAIRED_SIGN_CERT != ''
        env:
          WAIRED_SIGN_CERT: ${{ secrets.WAIRED_SIGN_CERT }}
          WAIRED_SIGN_CERT_PASSWORD: ${{ secrets.WAIRED_SIGN_CERT_PASSWORD }}
        shell: pwsh
        run: |
          $pfx = [System.IO.Path]::Combine($env:RUNNER_TEMP, "waired-sign-$([Guid]::NewGuid().ToString('N')).pfx")
          [System.IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WAIRED_SIGN_CERT))
          try {
            $setup = (Get-Item dist/WairedSetup-*.exe).FullName
            & signtool sign /f $pfx /p $env:WAIRED_SIGN_CERT_PASSWORD `
                /tr http://timestamp.digicert.com /fd sha256 /td sha256 $setup
            if ($LASTEXITCODE -ne 0) { throw "signtool exited $LASTEXITCODE" }
          } finally {
            Remove-Item -LiteralPath $pfx -Force -ErrorAction SilentlyContinue
          }

      - uses: actions/upload-artifact@v7
        if: matrix.goos == 'windows'
        with:
          name: windows-${{ matrix.goarch }}
          path: |
            dist/waired-windows-amd64.zip
            dist/waired-windows-amd64.zip.sha256
            dist/WairedSetup-*.exe
          if-no-files-found: error
          retention-days: 1

      # macOS-specific build. macos-14 ships make / tar / shasum + the
      # Xcode CLT on the runner image. build-agent-darwin cross-compiles
      # the amd64 slice toolchain-free (CGO_ENABLED=0); the bundled tray
      # (build-tray-darwin) is CGO_ENABLED=1 and builds both arches
      # natively here. Produces dist/waired-darwin-{amd64,arm64}.tar.gz +
      # .sha256 (each = waired + waired-agent + waired-tray) for install.sh.
      - name: Build macOS release tarballs
        if: matrix.goos == 'darwin'
        run: |
          set -euo pipefail
          export VERSION="${WAIRED_SEMVER}"
          make dist-darwin-installer
          ls -lh dist/

      - uses: actions/upload-artifact@v7
        if: matrix.goos == 'darwin'
        with:
          name: darwin-all
          path: |
            dist/waired-darwin-amd64.tar.gz
            dist/waired-darwin-amd64.tar.gz.sha256
            dist/waired-darwin-arm64.tar.gz
            dist/waired-darwin-arm64.tar.gz.sha256
          if-no-files-found: error
          retention-days: 1
