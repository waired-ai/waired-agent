# installtest-inference — the nightly installtest umbrella (#514, waired#760;
# re-homed from the pre-split monorepo per #1): the install→inference tail of
# the first-run journey, the 3-OS daemon-path setup-executor engine install
# (waired#835 §9/§11), the 3-OS coding-agent routing sentinel, and the
# Windows installer banner render check.
#
# installtest.yml (the per-PR gate) runs the real `install → service-manager
# → hands-free enroll` journey but STOPS before inference: every leg passes
# --skip-ollama / --inference-enabled=false. This workflow runs the SAME
# harness with inference ON — install.sh / install.ps1 install Ollama, and
# `waired init --inference-enabled=true` pulls the bundled model in its
# deploy phase and runs the end-of-init benchmark. That covers the class
# where the post-install benchmark / auto model-fallback never ran on a
# fresh bundled install, which an install/enroll-only gate cannot see.
#
# Why scheduled, not per-PR: Ollama install + a bundled-model pull (~5 GB) +
# a benchmark is minutes-scale and depends on EXTERNAL state (the upstream
# Ollama install script + the model registry), so it suits a nightly canary.
# Being schedule/dispatch-only it carries no paths filter and is never a
# required check.
#
# The banner job is per waired#760: the cp932 render check only breaks on
# installer-surface changes, so it left the per-PR critical path (~2 min)
# and runs here nightly instead.
#
# Runners: Linux on a GH-hosted disposable VM; Windows/macOS DELIBERATELY
# stay on the self-hosted ephemeral-VM pools even though the rest of CI is
# GH-hosted (public repo, free minutes): the inference tail needs hardware
# representative of real user machines — hosted macOS runners are
# virtualized with no GPU/Metal and little RAM (waired#573 showed even a
# 4 GB tart VM can't boot the Metal engine) — and the banner render check
# needs a real interactive console, which hosted runners (service session)
# never have.
name: installtest-inference

on:
  schedule:
    # 08:00 UTC weekdays (17:00 JST). Offset from catalog-radar (Wed 00:00)
    # and renovate (Mon 00:00) so the heavy jobs never contend for runners.
    - cron: "0 8 * * 1-5"
  workflow_dispatch:
    inputs:
      os:
        description: Which OS leg(s) to run (cheap single-OS dry-runs)
        default: all
        type: choice
        options: [all, linux, windows, macos]
      gpu:
        description: GPU vLLM install+serve lane (needs a self-hosted L4 runner)
        default: 'off'
        type: choice
        options: ['off', quick, full]

concurrency:
  group: installtest-inference
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write       # Workload Identity Federation (mint the enroll token)

defaults:
  run:
    shell: bash

jobs:
  # Resolve which OS legs to run from the dispatch input (default = all three;
  # a schedule has no input → all three). A dynamic matrix keeps a single-OS
  # dry-run from spinning up the self-hosted Windows / macOS runners.
  legs:
    name: select legs
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - id: pick
        env:
          SEL: ${{ github.event.inputs.os || 'all' }}
        run: |
          set -euo pipefail
          linux='{"os":"linux","runs-on":"ubuntu-24.04","timeout":35}'
          windows='{"os":"windows","runs-on":["self-hosted","windows","x64","build"],"timeout":45}'
          macos='{"os":"macos","runs-on":["self-hosted","macos","arm64","build"],"timeout":45}'
          case "$SEL" in
            linux)   legs="[$linux]" ;;
            windows) legs="[$windows]" ;;
            macos)   legs="[$macos]" ;;
            *)       legs="[$linux,$windows,$macos]" ;;
          esac
          echo "matrix={\"include\":$legs}" >> "$GITHUB_OUTPUT"

  installtest-inference:
    needs: legs
    name: install+inference (${{ matrix.os }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false      # a red Windows/macOS leg must not hide a green Linux
      matrix: ${{ fromJSON(needs.legs.outputs.matrix) }}
    env:
      # Tier 2: hands-free enroll vs the real dev control plane (#339 grant).
      IT_ENROLL_MODE: oidc
      IT_IMPERSONATE_SA: waired-devtest-login@dev-waired.iam.gserviceaccount.com
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # Self-hosted images bake the Go toolchain + caches locally; only
          # Linux keeps GitHub's remote cache (mirrors installtest.yml).
          cache: ${{ matrix.os == 'linux' }}

      # gcloud needs Python ≥3.10 — same shim as installtest.yml.
      - name: point gcloud at the image's Python ≥3.10 (self-hosted macOS)
        if: matrix.os == 'macos'
        run: |
          set -euo pipefail
          py="$(/opt/homebrew/bin/brew --prefix python@3.14)/bin/python3.14"
          test -x "$py"
          echo "CLOUDSDK_PYTHON=$py" >> "$GITHUB_ENV"

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      # Windows skips the SDK install — the image bakes gcloud (mirrors
      # installtest.yml).
      - uses: google-github-actions/setup-gcloud@v3
        with:
          skip_install: ${{ matrix.os == 'windows' }}

      # Linux: in-place install (systemd is PID 1 on the disposable runner) +
      # --inference → install.sh installs Ollama, `waired init
      # --inference-enabled=true` pulls the bundled model + benchmarks on CPU.
      - name: install+inference (linux, tier 2)
        if: matrix.os == 'linux'
        env:
          IT_LOCAL: "1"
          IT_ALLOW_LOCAL_DESTRUCTIVE: "1"
        run: |
          set -euo pipefail
          export PATH="$HOME/go/bin:$PATH"
          bash scripts/dev/installtest-host-up.sh
          bash scripts/dev/installtest-run.sh --tier 2 --inference 2>&1 | tee it-inf.log

      # Windows: install.ps1 (the runner is already elevated) + -WithInference.
      # No tee here — the exit code must propagate directly; the full
      # transcript is in this step's log.
      - name: install+inference (windows, tier 2)
        if: matrix.os == 'windows'
        shell: pwsh
        run: ./scripts/dev/installtest-windows.ps1 -Tier 2 -WithInference

      # macOS: install.sh darwin + --inference (system LaunchDaemon, so it
      # serves headless). Needs passwordless sudo (the ephemeral VM admin
      # has it).
      - name: install+inference (macos, tier 2)
        if: matrix.os == 'macos'
        run: |
          set -euo pipefail
          bash scripts/dev/installtest-macos.sh --tier 2 --inference 2>&1 | tee it-inf.log

      # #22: on a macOS failure the ollama engine's own stdout+stderr — the
      # real "exit status 1" reason — lives in a root-owned engine.log the
      # transcript never shows. Stage it (+ the tee'd it-inf.log) so a
      # nightly failure is diagnosable without a live self-hosted runner.
      - name: collect ollama diagnostics (macos)
        if: failure() && matrix.os == 'macos'
        run: |
          mkdir -p diag
          [ -f it-inf.log ] && cp it-inf.log diag/ || true
          englog="/Library/Application Support/waired/runtimes/ollama/logs/engine.log"
          if sudo test -f "$englog"; then
            sudo cp "$englog" diag/engine.log && sudo chown "$(id -un)" diag/engine.log || true
          fi
          ls -la diag || true
      - name: upload ollama diagnostics (macos)
        if: failure() && matrix.os == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: ollama-diag-install-inference-macos-${{ github.run_attempt }}
          path: diag/
          if-no-files-found: ignore
          retention-days: 14

      # Surface a one-line result + any captured throughput in the run summary
      # (Actions-native, no auto-issue). bash exists on all three runners.
      # The Windows leg has no it-inf.log, so it just records the job status.
      - name: job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## install+inference (${{ matrix.os }})"
            echo "- result: **${{ job.status }}**"
            if [ -f it-inf.log ]; then
              grep -iE 'summary:|[0-9.]+ *(tok|tokens)/s' it-inf.log \
                | sed -E 's/\x1b\[[0-9;]*m//g; s/^/- /' | tail -6 || true
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # 3-OS daemon-path setup-executor engine install (waired#835 §9/§11). Unlike
  # install+inference above, the engine is DELIBERATELY absent after install
  # (install.sh/.ps1 run --skip-ollama) and the enrol is driven through the
  # DAEMON path — the real post-#119 first-run — by completing the daemon's
  # login session out-of-band via the OIDC grant, so the resident `waired init`
  # executor installs the engine. The standalone --google-sa-login enrol the
  # other legs use never reaches that path. Nightly (a real engine install +
  # tiny model pull is minutes-scale + external-state, like install+inference).
  # See scripts/dev/lib/installtest-daemon-engine.sh for the WHY.
  daemon-engine:
    needs: legs
    name: daemon-path engine install (${{ matrix.os }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false      # a red Windows/macOS leg must not hide a green Linux
      matrix: ${{ fromJSON(needs.legs.outputs.matrix) }}
    env:
      # Tier 2: hands-free enroll vs the real dev control plane (#339 grant).
      IT_ENROLL_MODE: oidc
      IT_IMPERSONATE_SA: waired-devtest-login@dev-waired.iam.gserviceaccount.com
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: ${{ matrix.os == 'linux' }}

      - name: point gcloud at the image's Python ≥3.10 (self-hosted macOS)
        if: matrix.os == 'macos'
        run: |
          set -euo pipefail
          py="$(/opt/homebrew/bin/brew --prefix python@3.14)/bin/python3.14"
          test -x "$py"
          echo "CLOUDSDK_PYTHON=$py" >> "$GITHUB_ENV"

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v3
        with:
          skip_install: ${{ matrix.os == 'windows' }}

      # Linux: in-place install (systemd is PID 1 on the disposable runner),
      # engine ABSENT (--skip-ollama), then daemon-path init → executor install.
      - name: daemon-path engine install (linux, tier 2)
        if: matrix.os == 'linux'
        env:
          IT_LOCAL: "1"
          IT_ALLOW_LOCAL_DESTRUCTIVE: "1"
        run: |
          set -euo pipefail
          export PATH="$HOME/go/bin:$PATH"
          bash scripts/dev/installtest-host-up.sh
          bash scripts/dev/installtest-run.sh --tier 2 --daemon-engine

      - name: daemon-path engine install (windows, tier 2)
        if: matrix.os == 'windows'
        shell: pwsh
        run: ./scripts/dev/installtest-windows.ps1 -Tier 2 -DaemonEngine

      - name: daemon-path engine install (macos, tier 2)
        if: matrix.os == 'macos'
        run: bash scripts/dev/installtest-macos.sh --tier 2 --daemon-engine

      - name: job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## daemon-path engine install (${{ matrix.os }})"
            echo "- result: **${{ job.status }}**"
          } >> "$GITHUB_STEP_SUMMARY"

  # 3-OS coding-agent routing sentinel (#496). Rides the SAME enrolled-daemon
  # harness with `--integration`, which pins the tiny 0.5B as the bundled
  # model (deploy pulls ~0.4 GB), then runs the Go routing harness that
  # drives each leg at the gateway surface and asserts served-locally via the
  # observability event ring. (The old per-PR Linux routing-sentinel workflow
  # is not yet re-homed — #1.)
  routing:
    needs: legs
    name: routing sentinel (${{ matrix.os }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.legs.outputs.matrix) }}
    env:
      IT_ENROLL_MODE: oidc
      IT_IMPERSONATE_SA: waired-devtest-login@dev-waired.iam.gserviceaccount.com
      # Fail-open guard: a regression that reaches real Anthropic gets a 401
      # with this bogus token (the event-ring sentinel is the portable
      # primary).
      ANTHROPIC_AUTH_TOKEN: waired-routing-sentinel-dummy-not-a-real-key
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: ${{ matrix.os == 'linux' }}

      - name: point gcloud at the image's Python ≥3.10 (self-hosted macOS)
        if: matrix.os == 'macos'
        run: |
          set -euo pipefail
          py="$(/opt/homebrew/bin/brew --prefix python@3.14)/bin/python3.14"
          test -x "$py"
          echo "CLOUDSDK_PYTHON=$py" >> "$GITHUB_ENV"

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v3
        with:
          skip_install: ${{ matrix.os == 'windows' }}

      # Linux-only belt-and-braces egress blackhole (disposable runner). The
      # self-hosted Windows/macOS pools rely on dummy-token + sentinel only —
      # no egress edits on a reused slot.
      - name: blackhole api.anthropic.com (fail-open guard, linux)
        if: matrix.os == 'linux'
        run: echo "0.0.0.0 api.anthropic.com" | sudo tee -a /etc/hosts >/dev/null

      - name: routing sentinel (linux, tier 2 + integration)
        if: matrix.os == 'linux'
        env:
          IT_LOCAL: "1"
          IT_ALLOW_LOCAL_DESTRUCTIVE: "1"
        run: |
          set -euo pipefail
          export PATH="$HOME/go/bin:$PATH"
          bash scripts/dev/installtest-host-up.sh
          bash scripts/dev/installtest-run.sh --tier 2 --integration

      - name: routing sentinel (windows, tier 2 + integration)
        if: matrix.os == 'windows'
        shell: pwsh
        run: ./scripts/dev/installtest-windows.ps1 -Tier 2 -WithIntegration

      - name: routing sentinel (macos, tier 2 + integration)
        if: matrix.os == 'macos'
        run: bash scripts/dev/installtest-macos.sh --tier 2 --integration 2>&1 | tee it-inf.log

      # #22: same as the install+inference leg — surface the ollama engine's
      # own engine.log (the real startup-crash reason) on a macOS failure.
      - name: collect ollama diagnostics (macos)
        if: failure() && matrix.os == 'macos'
        run: |
          mkdir -p diag
          [ -f it-inf.log ] && cp it-inf.log diag/ || true
          englog="/Library/Application Support/waired/runtimes/ollama/logs/engine.log"
          if sudo test -f "$englog"; then
            sudo cp "$englog" diag/engine.log && sudo chown "$(id -un)" diag/engine.log || true
          fi
          ls -la diag || true
      - name: upload ollama diagnostics (macos)
        if: failure() && matrix.os == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: ollama-diag-routing-macos-${{ github.run_attempt }}
          path: diag/
          if-no-files-found: ignore
          retention-days: 14

      - name: job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## routing sentinel (${{ matrix.os }})"
            echo "- result: **${{ job.status }}**"
          } >> "$GITHUB_STEP_SUMMARY"

  # Windows installer banner render regression guard, moved out of the per-PR
  # path (waired#760). The rich UTF-8 banner is emitted ONLY to a real TTY,
  # so redirected-stdout install steps never render it — visual banner
  # mojibake is invisible to normal CI. This spawns install.ps1 in a fresh
  # console under BOTH PowerShell editions, decodes the served script through
  # cp932 (byte-identical to the JP/CN `iwr|iex` wire path), reads the
  # child's own screen buffer, and asserts the banner glyphs survive with no
  # "?" mojibake. -SelfCheck also proves the detector catches an injected
  # regression. Windows-only; needs a real console, hence the self-hosted VM.
  banner:
    name: banner render check (windows, cp932)
    if: (github.event.inputs.os || 'all') == 'all' || github.event.inputs.os == 'windows'
    runs-on: [self-hosted, windows, x64, build]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: banner render check (real console + cp932)
        shell: pwsh
        run: ./scripts/dev/installtest-banner-render.ps1 -SelfCheck

      - name: job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## banner render check (windows)"
            echo "- result: **${{ job.status }}**"
          } >> "$GITHUB_STEP_SUMMARY"

  # GPU vLLM install + serve (waired#835 Phase 2, #153). This is the GPU lane
  # the "GPU テスト実行義務" decision (docs/decisions.md) has mandated since
  # Step 2: "when CI is built, include a GPU lane that runs make e2e-vllm".
  # It reuses that harness verbatim — a real `waired runtimes install vllm`
  # venv build (the same vllmInstallCore the setup executor drives on the
  # onboarding path) followed by a served /v1/chat/completions smoke against a
  # real GPU (in-process gateway; no daemon/CP/enrol needed).
  #
  # Runs ONLY on a self-hosted L4 runner and ONLY when the GPU_RUNNER_ENABLED
  # repo variable is set (schedule) or a dispatch selects it — so it is
  # dormant, not queued-forever, until the GCP L4 ephemeral runner pool is
  # provisioned (blocking requirement per the same decision). GitHub-hosted
  # GPU runners are a single Tesla T4 (compute capability 7.5) — below vLLM's
  # SM_80 floor (internal/runtime/vllm_install.go VLLMVerifyImports) — so they
  # cannot host this; L4 (Ada, SM 8.9, 24 GB) is the target (g2-standard-4).
  vllm-install:
    name: vLLM install + serve (linux, l4)
    if: >-
      ${{ (github.event_name == 'schedule' && vars.GPU_RUNNER_ENABLED == 'true')
       || (github.event_name == 'workflow_dispatch' && (github.event.inputs.gpu || 'off') != 'off') }}
    runs-on: [self-hosted, linux, gpu, l4]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # The L4 image bakes the Go toolchain + caches locally (mirrors the
          # other self-hosted legs).
          cache: false

      - name: nvidia-smi (fail fast if the runner lost its GPU)
        run: nvidia-smi

      - name: state dir (install + e2e both resolve <state-dir>/runtimes/vllm)
        run: echo "WAIRED_STATE_DIR=$RUNNER_TEMP/waired-state" >> "$GITHUB_ENV"

      - name: build waired
        run: go build -o "$RUNNER_TEMP/waired" ./cmd/waired

      - name: install vLLM venv (real ~6 GB build; exercises vllmInstallCore)
        run: |
          set -euo pipefail
          "$RUNNER_TEMP/waired" runtimes install vllm --yes --state-dir "$WAIRED_STATE_DIR" 2>&1 | tee vllm-install.log

      - name: serve smoke (make e2e-vllm-quick; full on schedule / dispatch=full)
        run: |
          set -euo pipefail
          target=e2e-vllm-quick
          if [ "${{ github.event_name }}" = schedule ] || [ "${{ github.event.inputs.gpu }}" = full ]; then
            target=e2e-vllm
          fi
          echo "running make $target (WAIRED_STATE_DIR=$WAIRED_STATE_DIR)"
          make "$target" 2>&1 | tee vllm-e2e.log

      - name: job summary
        if: always()
        run: |
          {
            echo "## vLLM install + serve (l4)"
            echo "- result: **${{ job.status }}**"
            grep -iE 'installed at|[0-9.]+ *tok/s|--- PASS|--- FAIL' vllm-e2e.log vllm-install.log 2>/dev/null \
              | sed -E 's/\x1b\[[0-9;]*m//g; s/^/- /' | tail -8 || true
          } >> "$GITHUB_STEP_SUMMARY"

      - name: upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vllm-gpu-${{ github.run_attempt }}
          path: |
            vllm-install.log
            vllm-e2e.log
          if-no-files-found: ignore
          retention-days: 14
