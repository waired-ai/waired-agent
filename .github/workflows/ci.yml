# PR/push gate for waired-agent. Derived from the monorepo ci.yml at the
# #184 split. All jobs run on GitHub-hosted runners: the repo is public,
# so hosted standard runners are free, and keeping PR CI off self-hosted
# infrastructure is the safer default for a public repo.
name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: lint (gofmt + vet + golangci-lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          set -euo pipefail
          out=$(gofmt -l .)
          if [ -n "${out}" ]; then
            echo "::error::gofmt issues:"
            printf '%s\n' "${out}"
            exit 1
          fi

      - name: go vet (root + proto)
        run: |
          set -euo pipefail
          go vet ./...
          (cd proto && go vet ./...)

      # The hardened production build (-tags prod) must compile and vet
      # cleanly; buildflag gates the agent-side bypass flags off.
      - name: prod build smoke (-tags prod)
        run: |
          set -euo pipefail
          go build -tags prod ./...
          go vet -tags prod ./...
          go test -tags prod ./internal/buildflag/...

      - name: proto dependency allowlist
        run: |
          set -euo pipefail
          # The shared protocol module must stay minimal and auditable:
          # stdlib plus golang.org/x/crypto (disco sealed frames:
          # ChaCha20-Poly1305 / X25519 / HKDF) and its x/sys transitive.
          # Checked at the package-import level: `go list -m all` would
          # overcount (x/crypto's own go.mod pulls x/net etc. into the
          # module graph without them ever being imported).
          bad=$(cd proto && go list -f '{{if not .Standard}}{{.ImportPath}}{{end}}' -deps ./... | \
            grep -vE '^$' | \
            grep -vE '^github\.com/waired-ai/waired-agent/proto(/|$)' | \
            grep -vE '^golang\.org/x/(crypto|sys)(/|$)' || true)
          if [ -n "${bad}" ]; then
            echo "::error::proto packages import dependencies outside the allowlist:"
            printf '%s\n' "${bad}"
            exit 1
          fi

      - name: license check (no copyleft dependencies)
        # Apache-2.0 repo (#666): fail fast when a new dependency brings
        # forbidden/restricted (GPL/LGPL-class) licensing. Own modules
        # are excluded — the repo LICENSE covers them and the replace'd
        # proto module carries no license file of its own.
        run: |
          set -euo pipefail
          go run github.com/google/go-licenses@v1.6.0 check ./... \
            --disallowed_types=forbidden,restricted \
            --ignore github.com/waired-ai/waired-agent \
            --ignore github.com/waired-ai/waired-agent/proto

      - name: testnet gate guard (every internal/ package classified)
        # Keeps the per-PR testnet gate's judgement-based allowlist honest:
        # a new internal/ package fails lint until it is classified in
        # scripts/ci/testnet-relevant-paths.txt or
        # scripts/ci/testnet-nonrelevant-packages.txt (same design as the
        # monorepo's guard, waired#738).
        run: bash scripts/ci/testnet-gate-guard.sh

      # Keep the paths-gated client gates' filters honest (re-homed from the
      # monorepo at #1). Each guard fails lint if its workflow's paths lose a
      # required anchor — or, for the go-list-derived ones, if a new test
      # dependency is neither covered by a paths glob nor allowlisted — so a
      # paths-gated gate cannot silently drop coverage. installtest is now
      # always-on (no paths filter), so it deliberately has no guard.
      - name: codeui-multios paths guard
        run: bash scripts/ci/codeui-multios-paths-guard.sh

      - name: amsi-scan paths guard
        run: bash scripts/ci/amsi-scan-paths-guard.sh

      - name: routing-sentinel paths guard
        run: bash scripts/ci/routing-sentinel-paths-guard.sh

      - name: tray-darwin paths guard
        run: bash scripts/ci/tray-darwin-paths-guard.sh

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  dco:
    # DCO enforcement (#666): every PR commit needs a Signed-off-by
    # trailer (CONTRIBUTING.md). Deliberately checkout-free: the job
    # reads commit metadata via the API only, so fork PRs get this
    # feedback without executing any fork code.
    name: dco (Signed-off-by on every commit)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: check Signed-off-by trailers
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Merge commits (>1 parent) are exempt, matching the DCO app's
          # behaviour; everything else must carry the trailer.
          bad=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.number }}/commits" \
            --paginate \
            --jq '.[] | select((.parents | length) < 2)
                      | select((.commit.message | test("(?m)^Signed-off-by: .+ <.+@.+>$")) | not)
                      | .sha')
          if [ -n "${bad}" ]; then
            echo "::error::commits missing a Signed-off-by trailer (see CONTRIBUTING.md; use 'git commit -s'):"
            printf '%s\n' "${bad}"
            exit 1
          fi

  gitleaks:
    # Secret scan over the full git history (config: .gitleaks.toml).
    # Runs the pinned release binary instead of gitleaks-action (the
    # action requires a license key for organization repos).
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: run gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tgz
          tar -C /tmp -xzf /tmp/gitleaks.tgz gitleaks
          /tmp/gitleaks detect --source . --no-banner --redact

  unit:
    name: unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: go test (root)
        run: go test ./... -timeout 10m

      - name: go test (proto)
        run: cd proto && go test ./... -timeout 5m

  unit-testharness:
    name: unit tests (testharness)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: go test -tags testharness
        run: go test -tags testharness ./internal/testharness/... -timeout 10m

  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: cross-compile every cmd/*
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          for cmd in cmd/*/; do
            name=$(basename "${cmd}")
            echo "==> building ${name} for ${GOOS}/${GOARCH}"
            go build -trimpath -ldflags="-s -w" -o /dev/null ./${cmd}
          done

      - name: verify-cross (3-OS go vet)
        run: make verify-cross

  install-scripts:
    name: install-scripts (dash matrix + shellcheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      # busybox is not preinstalled on the hosted image; without it
      # installtest-dash.sh silently drops its `busybox sh` matrix leg.
      - name: install busybox (third shell in the dash matrix)
        run: sudo apt-get install -y busybox

      - name: shellcheck installer scripts
        run: make install-script-lint

      - name: install.sh dash dispatch matrix
        run: bash scripts/dev/installtest-dash.sh

      - name: autostart Exec path guard
        run: bash scripts/ci/autostart-exec-guard.sh
