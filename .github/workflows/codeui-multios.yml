# Multi-OS coverage for the bundled OpenCode "codeui" coding agent (#501).
#
# The codeui package (internal/runtime/codeui) is CODED for all 6
# platform/arch combos but its RUNTIME behaviour was only ever validated on
# Linux (the #440 LXD run). `make verify-cross` proves it compiles everywhere;
# nothing proved it RUNS on Windows/macOS. This workflow closes that in two
# layers:
#
#   L1 - codeui/opencode UNIT tests (fakes, no network): catches .exe naming,
#        zip vs tar.gz extraction, path joins. Cheap, deterministic.
#   L2 - real `opencode serve` LIFECYCLE smoke (`-tags integration`): downloads
#        the real pinned opencode binary, verifies its sha256, extracts, runs
#        `opencode serve`, asserts the embedded web UI returns 2xx and POST
#        /session succeeds, then stops it (process-group on unix / Job Object on
#        Windows). NO model/GPU - inference (L3) is out of scope and OS-agnostic.
#
# All three legs run on GH-hosted runners (free on this public repo). The
# L2 smoke still downloads the real opencode binary from GitHub releases on
# every run, so this stays PATHS-GATED to the codeui surface + the opencode
# pin (which lives, with its 6-platform sha256 set, in
# internal/runtime/codeui/install.go) + the OS-split spawner the L2 smoke
# drives. It does NOT run on every PR.
#
# NOTE: because it is paths-filtered, this workflow produces no check run when
# the codeui surface is untouched, so it CANNOT be a required status check.
# scripts/ci/codeui-multios-paths-guard.sh (run in ci.yml's always-on lint job)
# guards the filter against going stale - the same belt-and-braces pattern as
# deploy-dev-paths-guard.sh.
name: codeui-multios

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - internal/runtime/codeui/**
      - internal/integration/opencode/**
      - internal/runtime/spawner_unix.go
      - internal/runtime/spawner_windows.go
      - go.mod
      - go.sum
      - .github/workflows/codeui-multios.yml
  push:
    branches: [main]
    paths:
      - internal/runtime/codeui/**
      - internal/integration/opencode/**
      - internal/runtime/spawner_unix.go
      - internal/runtime/spawner_windows.go
      - go.mod
      - go.sum
      - .github/workflows/codeui-multios.yml

concurrency:
  group: codeui-multios-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

# safe.directory=* for the Linux container leg; harmless on hosted Win/macOS.
# Mirrors reusable-build-artifacts.yml.
env:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: safe.directory
  GIT_CONFIG_VALUE_0: "*"

defaults:
  run:
    shell: bash

jobs:
  codeui:
    name: codeui (${{ matrix.goos }})
    # Same-repo only: fork PRs get a skipped check (not failed); a
    # maintainer arms a reviewed fork PR by pushing its branch to this repo.
    # Mirrors installtest.yml (public-repo caution, waired-agent CLAUDE.md).
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ${{ matrix.runs-on }}
    container: ${{ fromJSON(matrix.container) }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: containerized to match daily CI's build substrate. setup-go's
          # go-version-file overrides the container's bundled toolchain.
          - goos: linux
            runs-on: ubuntu-24.04
            container: '{"image":"golang:1.24-trixie"}'
          # Windows/macOS: container-less. 'null' -> fromJSON -> no container.
          # The key trick, per reusable-build-artifacts.yml.
          - goos: windows
            runs-on: windows-latest
            container: 'null'
          # macOS: GH-hosted Apple-Silicon runner (pinned like the ubuntu leg).
          - goos: darwin
            runs-on: macos-14
            container: 'null'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # L1 - unit layer (fakes, no network). Fast; runs first so a logic
      # regression fails before we spend the download time.
      - name: L1 unit tests (codeui + opencode integration package)
        run: |
          set -euo pipefail
          go test -count=1 -timeout 5m \
            ./internal/runtime/codeui/... \
            ./internal/integration/opencode/...

      # L2 - real `opencode serve` lifecycle smoke. Downloads the real pinned
      # binary (outbound 443 to github releases), verifies sha256, extracts,
      # serves, asserts web-UI 200 + POST /session, stops. One retry absorbs a
      # transient github-release 5xx; a persistent failure still fails the leg.
      - name: L2 real opencode serve smoke (-tags integration)
        run: |
          set -euo pipefail
          run_smoke() {
            go test -tags integration -count=1 -v -timeout 10m \
              -run 'TestServe_RealLifecycle' \
              ./internal/runtime/codeui/...
          }
          if ! run_smoke; then
            echo "::warning::L2 codeui smoke failed once; retrying in case of a transient release-download error"
            sleep 10
            run_smoke
          fi
